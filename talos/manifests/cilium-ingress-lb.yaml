---
# LoadBalancer Service for Cilium Ingress
apiVersion: v1
kind: Service
metadata:
  name: cilium-ingress
  namespace: kube-system
  annotations:
    io.cilium/lb-ipam-ips: "10.198.141.236"
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 9080
    protocol: TCP
  - name: https
    port: 443
    targetPort: 9443
    protocol: TCP
  selector:
    app.kubernetes.io/name: cilium-envoy
