---
# Gateway API Examples for Cilium
# These examples demonstrate how to use Gateway API with Cilium's built-in Ingress Controller
---
# GatewayClass for Cilium
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: cilium
spec:
  controllerName: io.cilium/gateway-controller
  description: "Cilium Gateway Controller"
---
# Gateway - Main entry point
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: default
spec:
  gatewayClassName: cilium
  listeners:
  # HTTP listener (redirects to HTTPS)
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
  # HTTPS listener
  - name: https
    protocol: HTTPS
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: gateway-tls
        namespace: default
---
# HTTPRoute example - Basic routing
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-app-route
  namespace: demo-app
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "app.example.com"
  rules:
  # Route to frontend service
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend-service
      port: 80
---
# HTTPRoute example - Advanced routing with weights
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: canary-routing
  namespace: demo-app
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "api.example.com"
  rules:
  # Canary deployment: 90% to stable, 10% to canary
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: api-stable
      port: 8080
      weight: 90
    - name: api-canary
      port: 8080
      weight: 10
---
# HTTPRoute example - Header-based routing
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: header-based-routing
  namespace: demo-app
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "api.example.com"
  rules:
  # Route beta users to beta backend
  - matches:
    - headers:
      - name: X-User-Type
        value: beta
    backendRefs:
    - name: api-beta
      port: 8080
  # Default route for all other users
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: api-stable
      port: 8080
---
# TLSRoute example - TCP/TLS routing
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: database-tls-route
  namespace: demo-app
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
    sectionName: database-tls
  hostnames:
  - "db.example.com"
  rules:
  - backendRefs:
    - name: postgres-service
      port: 5432
---
# GRPCRoute example - gRPC routing
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: GRPCRoute
metadata:
  name: grpc-service-route
  namespace: demo-app
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  hostnames:
  - "grpc.example.com"
  rules:
  # Route specific gRPC method
  - matches:
    - method:
        service: com.example.UserService
        method: GetUser
    backendRefs:
    - name: user-service-grpc
      port: 9090
---
# ReferenceGrant - Allow cross-namespace references
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-routes
  namespace: default
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: demo-app
  - group: gateway.networking.k8s.io
    kind: GRPCRoute
    namespace: demo-app
  to:
  - group: ""
    kind: Service
---
# Example Services for the routes above
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: demo-app
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-stable
  namespace: demo-app
spec:
  selector:
    app: api
    version: stable
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-canary
  namespace: demo-app
spec:
  selector:
    app: api
    version: canary
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-beta
  namespace: demo-app
spec:
  selector:
    app: api
    version: beta
  ports:
  - port: 8080
    targetPort: 8080
