# Minimal Cilium Configuration for Talos Linux - Latest Tested
# Based on: https://docs.siderolabs.com/kubernetes-guides/cni/deploying-cilium

ipam:
  mode: kubernetes

kubeProxyReplacement: true

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Enable IPv4, Disable IPv6
ipv4:
  enabled: true
ipv6:
  enabled: false

k8sServiceHost: localhost
k8sServicePort: 7445

hubble:
  relay:
    enabled: true

l2announcements:
  enabled: true
