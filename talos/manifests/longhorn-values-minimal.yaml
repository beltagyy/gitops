# Minimal Longhorn Configuration for Talos Linux
# Based on: https://longhorn.io/docs/1.10.1/advanced-resources/os-distro-specific/talos-linux-support/

# Prerequisites:
# 1. Add system extensions to Talos machine config:
#    - siderolabs/iscsi-tools
#    - siderolabs/util-linux-tools
# 2. Pod security: enforce "privileged" for Longhorn namespace

# CSI Configuration for Talos
csi:
  kubeletRootDir: /var/lib/kubelet
  attacherReplicaCount: 1
  provisionerReplicaCount: 1
  resizerReplicaCount: 1
  snapshotterReplicaCount: 1

# Persistence - minimal setup
persistence:
  defaultClass: true
  defaultFsType: ext4
  defaultClassReplicaCount: 1
  defaultDataLocality: disabled
  reclaimPolicy: Delete

# Default Settings - Talos minimal
defaultSettings:
  # Data path for Talos (v1.10.x+ use /var/mnt/longhorn)
  defaultDataPath: /var/lib/longhorn/
  createDefaultDiskLabeledNodes: true

  # Minimal replica settings
  defaultReplicaCount: 1
  replicaSoftAntiAffinity: false
  replicaAutoBalance: disabled

  # Storage settings
  storageOverProvisioningPercentage: 200
  storageMinimalAvailablePercentage: 25

  # System settings
  guaranteedInstanceManagerCpu: 12
  taintToleration: ""
  systemManagedComponentsNodeSelector: ""
  kubernetesClusterAutoscalerEnabled: false

# UI - single replica for minimal setup
longhornUI:
  replicas: 1

# Tolerations for control-plane scheduling
longhornManager:
  tolerations:
    - operator: Exists

longhornDriver:
  tolerations:
    - operator: Exists

# Ingress disabled for minimal setup
ingress:
  enabled: false

# Metrics disabled for minimal setup
metrics:
  serviceMonitor:
    enabled: false

# Disable PSP (deprecated)
enablePSP: false
