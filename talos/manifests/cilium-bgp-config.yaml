---
# CiliumBGPPeeringPolicy for advertising Pod CIDRs and LoadBalancer IPs
# This example assumes you have BGP peers in your network infrastructure
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPPeeringPolicy
metadata:
  name: default-bgp-peering
spec:
  # Match all nodes in the cluster
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/control-plane: ""

  virtualRouters:
  - localASN: 64512
    exportPodCIDR: true
    serviceSelector:
      matchExpressions:
        - key: somekey
          operator: NotIn
          values: ['never-used-value']
    neighbors:
    # Example BGP peer - update with your actual router IPs
    - peerAddress: "192.168.1.1/32"
      peerASN: 64501
      eBGPMultihopTTL: 10
      connectRetryTimeSeconds: 120
      holdTimeSeconds: 90
      keepAliveTimeSeconds: 30
      gracefulRestart:
        enabled: true
        restartTimeSeconds: 120

    # Additional peer example
    - peerAddress: "192.168.1.2/32"
      peerASN: 64501
      eBGPMultihopTTL: 10
      connectRetryTimeSeconds: 120
      holdTimeSeconds: 90
      keepAliveTimeSeconds: 30
      gracefulRestart:
        enabled: true
        restartTimeSeconds: 120
---
# CiliumLoadBalancerIPPool for LoadBalancer services
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: default-pool
spec:
  blocks:
  # Update this IP range to match your network
  - start: "192.168.2.100"
    stop: "192.168.2.200"
  serviceSelector:
    matchLabels:
      io.kubernetes.service.namespace: "*"
---
# L2 Announcement Policy for advertising LoadBalancer IPs
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default-l2-policy
spec:
  serviceSelector:
    matchLabels:
      io.kubernetes.service.namespace: "*"
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  interfaces:
  - ^eth[0-9]+
  - ^ens[0-9]+
  - ^enp[0-9]+s[0-9]+
  externalIPs: true
  loadBalancerIPs: true
